name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Stub env vars required for build / tests (no real secrets needed for CI)
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/pantryiq
  ZERO_UPSTREAM_DB: postgres://postgres:postgres@localhost:5432/pantryiq
  ZERO_PORT: '8001'
  NEXT_PUBLIC_ZERO_URL: http://localhost:8001
  BETTER_AUTH_SECRET: ci-secret-for-testing-only-32-chars-xx
  BETTER_AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_POSTHOG_KEY: ''
  NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
  OPENAI_API_KEY: stub
  ANTHROPIC_API_KEY: stub
  GOOGLE_GENERATIVE_AI_API_KEY: stub

# ─────────────────────────────────────────────
# Job 1: Lint & type-check (fast, no DB needed)
# ─────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────
  # Job 2: Build
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 3: Unit tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 4: E2E tests (sharded across 4 runners)
  # ─────────────────────────────────────────────
  e2e-tests:
    name: E2E (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    needs: [lint, build]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: pantryiq
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only for speed)
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: npm run db:migrate

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Run E2E tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          CI: true

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 5: Merge Playwright reports
  # ─────────────────────────────────────────────
  e2e-report:
    name: Merge E2E Reports
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-*
          path: all-blob-reports/
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14
