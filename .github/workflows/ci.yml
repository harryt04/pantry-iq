name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  ZERO_UPSTREAM_DB: ${{ secrets.ZERO_UPSTREAM_DB }}
  DATABASE_SCHEMA: ci_test
  ZERO_PORT: '8001'
  NEXT_PUBLIC_ZERO_URL: http://localhost:8001
  BETTER_AUTH_SECRET: ci-secret-for-testing-only-32-chars-xx
  BETTER_AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
  NEXT_PUBLIC_POSTHOG_KEY: ''
  NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
  OPENAI_API_KEY: stub
  ANTHROPIC_API_KEY: stub
  GOOGLE_GENERATIVE_AI_API_KEY: stub

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Lint ─────────────────────────────────
      - name: Prettier check
        run: npx prettier --check .

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── Build ────────────────────────────────
      - name: Build
        run: npm run build

      # ── Unit tests ───────────────────────────
      - name: Unit tests
        run: npm run test:unit

      # ── Database & E2E tests ─────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup CI database schema
        run: npx tsx scripts/ci-setup-db.ts

      - name: Run database migrations
        run: npm run db:migrate

  e2e:
    name: E2E (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Setup CI database schema
        run: npx tsx scripts/ci-setup-db.ts

      - name: Run database migrations
        run: npm run db:migrate

      - name: E2E tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          CI: true

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  e2e-report:
    name: Merge E2E Reports
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-*
          path: all-blob-reports/
          merge-multiple: true

      - name: Merge into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 14
