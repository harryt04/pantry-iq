services:
  postgres:
    image: postgres:17-alpine
    container_name: pantryiq-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: pantryiq
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pantryiq
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  pantryiq:
    driver: bridge
