services:
  postgres:
    image: postgres:18-alpine
    container_name: pantryiq-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: pantryiq
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=logical'
    networks:
      - pantryiq
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  zero:
    image: rocicorp/zero:latest
    container_name: pantryiq-zero
    ports:
      - '8001:8001'
    environment:
      ZERO_UPSTREAM_DB: postgres://postgres:postgres@postgres:5432/pantryiq
      ZERO_PORT: 8001
      ZERO_ADMIN_PASSWORD: ${ZERO_ADMIN_PASSWORD:?ZERO_ADMIN_PASSWORD must be set}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pantryiq
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  pantryiq:
    driver: bridge
